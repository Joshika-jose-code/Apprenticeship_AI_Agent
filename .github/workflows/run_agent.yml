name: Run Apprenticeship Agent Every 48 Hours

on:
  schedule:
    - cron: '0 0 */2 * *'
  workflow_dispatch:

jobs:
  run-agent:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository Code
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          python3 -m pip install --upgrade pip
          pip3 install langgraph langchain-google-genai langchain-community tavily-python langchain-tavily

      - name: Execute Agent Script
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
        run: python3 agent.py

      - name: Commit and Push Updated Markdown List
        run: |
          git config --global user.name "Github Action Bot"
          git config --global user.email "actions@github.com"
          git add apprenticeship_listings.md || true
          git commit -m "Automated Sync: Updated Apprenticeship Listings" || exit 0
          git push
